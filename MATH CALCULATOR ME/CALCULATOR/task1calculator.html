<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Glass Calculator</title>
  <style>
    /* 1. Global Page Styles & Background */
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      
      /* New, dynamic background gradient */
      background: linear-gradient(135deg, #1e1e2f 0%, #2c2c54 100%);
      
      /* Optional: subtle texture overlay */
      background-image: 
        linear-gradient(135deg, #1e1e2f 0%, #2c2c54 100%),
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 50%);
    }

    /* 2. Main Calculator Container (Glassmorphism Effect) */
    .calculator {
      /* Frosted glass effect */
      background: rgba(31, 31, 46, 0.7); 
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px); /* for Safari */
      
      padding: 30px;
      border-radius: 25px;
      
      /* Subtle border and refined shadow */
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      
      width: 350px;
      display: flex;
      flex-direction: column;
      gap: 15px; /* simplified layout */
    }

    /* 3. Title Section */
    .title {
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.4em;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    /* 4. Display Input Styling */
    .display {
      width: 100%;
      height: 70px;
      
      /* Deeper inset visual */
      background: #121217;
      border: 1px solid #222;
      border-radius: 15px;
      
      color: #ffffff; /* retro-future green text */
      font-size: 2.2em;
      font-family: 'Courier New', Courier, monospace; /* for a focused, digital look */
      font-weight: bold;
      text-align: right;
      padding: 15px;
      outline: none;
      
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
      transition: all 0.2s;
    }

    /* 5. Buttons Grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px; /* modern gap */
    }

    /* 6. Base Button Styling */
    button {
      height: 65px;
      border: none;
      border-radius: 15px;
      font-size: 1.3em;
      cursor: pointer;
      font-weight: 500;
      transition: transform 0.1s ease, box-shadow 0.2s ease, background 0.2s ease;
      
      display: flex;
      justify-content: center;
      align-items: center;
      
      /* Subtle inset shadow for tactile feel */
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
    }

    /* 7. Button Hover/Click Effects */
    button:hover {
      background-color: rgba(255, 255, 255, 0.1); /* light shimmer */
      transform: translateY(-2px) scale(1.03); /* lift and scale */
      box-shadow: 0 5px 15px rgba(0,0,0,0.3); /* dynamic shadow */
    }

    button:active {
      transform: translateY(1px) scale(0.98); /* press effect */
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }

    /* 8. Specific Button Class Colors */
    .number {
      background: #2c2c3e;
      color: #e0e0e0;
    }

    .operator {
      background: #ff9f43;
      color: white;
    }
    .operator:hover { background-color: #ffb169; }

    .equal {
      background: #1dd1a1;
      color: white;
      grid-column: span 2; /* spans two columns */
      font-weight: bold;
      font-size: 1.8em;
    }
    .equal:hover { background-color: #26e6b5; }

    .clear {
      background: #ee5253;
      color: white;
    }
    .clear:hover { background-color: #f06a6b; }

    .delete {
      background: #576574;
      color: white;
      font-size: 1.1em;
    }
    .delete:hover { background-color: #6c7e8f; }

  </style>
</head>
<body>

<div class="calculator">
  <div class="title">Calculator</div>

  <input type="text" id="display" class="display" readonly>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="delete" onclick="deleteLast()">⌫</button>
    <button class="operator" onclick="append('/')">÷</button>
    <button class="operator" onclick="append('*')">×</button>

    <button class="number" onclick="append('7')">7</button>
    <button class="number" onclick="append('8')">8</button>
    <button class="number" onclick="append('9')">9</button>
    <button class="operator" onclick="append('-')">−</button>

    <button class="number" onclick="append('4')">4</button>
    <button class="number" onclick="append('5')">5</button>
    <button class="number" onclick="append('6')">6</button>
    <button class="operator" onclick="append('+')">+</button>

    <button class="number" onclick="append('1')">1</button>
    <button class="number" onclick="append('2')">2</button>
    <button class="number" onclick="append('3')">3</button>
    <button class="equal" onclick="calculate()">=</button>

    <button class="number" onclick="append('0')">0</button>
    <button class="number" onclick="append('.')">.</button>
  </div>
</div>

<script>
  // Cache the display element for efficiency
  const display = document.getElementById("display");

  // Appends a character to the display, handling edge cases
  function append(value) {
    // Basic prevention of multiple leading zeros
    if (display.value === "0" && value === "0") return;
    
    // Clear 'Error' or a finished calculation before new input
    if (display.value === "Error" || display.dataset.finishedCalc === "true") {
      display.value = "";
      delete display.dataset.finishedCalc; // remove the flag
    }
    
    // If appending a dot, ensure only one exists in the current number segment
    if (value === '.') {
      const parts = display.value.split(/[\+\-\*\/]/);
      const lastNumberSegment = parts[parts.length - 1];
      if (lastNumberSegment.includes('.')) return;
    }

    display.value += value;
  }

  // Fully clears the display
  function clearDisplay() {
    display.value = "";
    delete display.dataset.finishedCalc; // clear the flag
  }

  // Deletes only the last character
  function deleteLast() {
    if (display.value === "Error") {
      display.value = "";
      return;
    }
    display.value = display.value.slice(0, -1);
  }

  // Calculates the result using eval (for simplicity in this exercise)
  function calculate() {
    if (display.value === "" || display.value === "Error") return;

    try {
      // Basic sanitize: replace special symbols back to standard ones
      let expression = display.value.replace('÷', '/').replace('×', '*').replace('−', '-');
      
      // Use eval for this task. (Note: Avoid in production/user-input systems)
      let result = eval(expression);
      
      // Handle edge case of division by zero (result would be 'Infinity')
      if (result === Infinity || isNaN(result)) {
         display.value = "Error";
      } else {
         // Limit decimal places to 8 for cleaner display
         display.value = Number(result).toPrecision(8).replace(/\.?0+$/, '');
      }

      // Mark that a calculation just finished
      display.dataset.finishedCalc = "true";

    } catch (error) {
      display.value = "Error";
    }
  }
</script>

</body>
</html>
